<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulsePrice Moldova - Recomandare Inteligenta de Produse</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <img class="logo-icon" src="assets/images/PulsePriceLogo.png" alt="PulsePrice logo">
            </div>
            <p class="tagline">Sistem Inteligent de Recomandare Produse din Moldova</p>
            <div class="store-strip">
                <span style="color: var(--text-secondary); font-size: 0.95rem;">🦎 Darwin</span>
                <span style="color: var(--text-secondary); font-size: 0.95rem;">🌵 Cactus</span>
                <span style="color: var(--text-secondary); font-size: 0.95rem;">💣 Bomba</span>
                <span style="color: var(--text-secondary); font-size: 0.95rem;">🐼 PandaShop</span>
                <button onclick="app.showWishlistModal()" class="wishlist-header-btn" title="Lista de favorite">
                    ❤️ Favorite (<span id="wishlistCount">0</span>)
                </button>
                <span id="currentUserName" class="current-user"></span>
                <button id="logoutBtn" class="logout-btn" title="Iesire din cont">Iesire</button>
            </div>
        </header>

        <section id="searchHistory" class="search-history" style="display: none;">
            <div class="history-header">
                <h3>🕒 Căutări recente</h3>
                <button onclick="app.clearSearchHistory()" class="clear-history-btn">Șterge</button>
            </div>
            <div class="history-list"></div>
        </section>

        <section class="search-section">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="11" cy="11" r="8" stroke-width="2"/>
                        <path d="M21 21l-4.35-4.35" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                    <input 
                        type="text" 
                        id="searchInput" 
                        class="search-input" 
                        placeholder="Caută produsul dorit (ex: laptop, telefon, televizor...)"
                    >
                    <button id="searchBtn" class="search-btn">
                        <span>Caută în 4 Magazine</span>
                    </button>
                </div>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label for="priceRange">Buget Maxim (MDL):</label>
                    <input type="number" id="priceRange" placeholder="Ex: 10000" min="0" step="100">
                </div>
                
                <div class="filter-group">
                    <label for="minRating">Rating Minim:</label>
                    <select id="minRating">
                        <option value="0">Oricare</option>
                        <option value="3">3+ ⭐</option>
                        <option value="4">4+ ⭐</option>
                        <option value="4.5">4.5+ ⭐</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="sortBy">Sortează după:</label>
                    <select id="sortBy">
                        <option value="score">Cel mai recomandat</option>
                        <option value="price-asc">Preț crescător</option>
                        <option value="price-desc">Preț descrescător</option>
                        <option value="rating">Rating</option>
                    </select>
                </div>

                <div class="filter-group checkbox-group">
                    <label>
                        <input type="checkbox" id="inStock" checked>
                        <span>Doar în stoc</span>
                    </label>
                </div>
            </div>
        </section>

        <div id="loadingState" class="loading-state hidden">
            <div class="spinner"></div>
            <p>Analizez produsele cu AI...</p>
        </div>

        <section id="resultsSection" class="results-section hidden">
            <div class="results-header">
                <h2>Recomandări Personalizate</h2>
                <span id="resultsCount" class="results-count"></span>
            </div>
            <div id="productGrid" class="product-grid"></div>
        </section>

        <div id="emptyState" class="empty-state">
            <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="10" stroke-width="2"/>
                <path d="M12 16v-4M12 8h.01" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <h3>Începe căutarea ta</h3>
            <p>Introdu numele produsului dorit și lasă inteligența artificială să găsească cele mai bune oferte pentru tine</p>
        </div>

        <div id="productModal" class="modal hidden">
            <div class="modal-content">
                <button class="modal-close" id="closeModal">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M18 6L6 18M6 6l12 12" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="nlp-engine.js"></script>
    <script src="recommendation-engine.js"></script>
    <script src="scraper.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
